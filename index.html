<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>閩南語卡通錄音室</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:       #1a1a2e;
      --paper:     #fdf8f0;
      --cream:     #f5ede0;
      --gold:      #c9922a;
      --gold-lt:   #f0d080;
      --red:       #c0392b;
      --green:     #27ae60;
      --blue:      #2471a3;
      --shadow:    rgba(26,26,46,0.12);
      --radius:    14px;
      --toolbar-h: 60px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--ink);
      color: var(--ink);
      font-family: 'Noto Sans TC', sans-serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* ═══════════════════════════════════════
       TOP BAR
    ═══════════════════════════════════════ */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--toolbar-h);
      background: var(--ink);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
      border-bottom: 2px solid var(--gold);
    }

    .topbar-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--gold-lt);
      letter-spacing: 0.05em;
    }

    .topbar-status {
      font-size: 0.78rem;
      color: var(--gold-lt);
      background: rgba(201,146,42,0.15);
      border: 1px solid rgba(201,146,42,0.3);
      padding: 4px 12px;
      border-radius: 999px;
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ═══════════════════════════════════════
       LAYOUT
    ═══════════════════════════════════════ */
    .app {
      padding-top: var(--toolbar-h);
      height: 100dvh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr auto;
    }

    /* ── Left: Video ── */
    .panel-video {
      grid-column: 1;
      grid-row: 1 / 3;
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
      overflow: hidden;
    }

    video {
      width: 100%;
      border-radius: var(--radius);
      background: #000;
      flex-shrink: 0;
    }

    .hint-box {
      background: rgba(201,146,42,0.08);
      border: 1px solid rgba(201,146,42,0.25);
      border-radius: var(--radius);
      padding: 12px 16px;
    }
    .hint-box p {
      font-size: 0.8rem;
      color: #b8a080;
      line-height: 1.6;
    }
    .hint-box strong { color: var(--gold-lt); }

    /* ── Right top: Controls ── */
    .panel-controls {
      grid-column: 2;
      grid-row: 1;
      background: var(--paper);
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Right bottom: Action bar ── */
    .panel-actions {
      grid-column: 2;
      grid-row: 2;
      background: var(--cream);
      border-top: 2px solid rgba(201,146,42,0.3);
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ═══════════════════════════════════════
       OPTION TOGGLES
    ═══════════════════════════════════════ */
    .options-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #555;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 999px;
      padding: 6px 12px;
      cursor: pointer;
      user-select: none;
      transition: background .15s, border-color .15s;
    }
    .toggle-label:has(input:checked) {
      background: #fff7e0;
      border-color: var(--gold);
      color: #7a5500;
      font-weight: 700;
    }
    .toggle-label input { display: none; }

    /* ═══════════════════════════════════════
       GLOBAL ACTION BUTTONS
    ═══════════════════════════════════════ */
    .btn-row {
      display: flex;
      gap: 8px;
    }

    .btn {
      min-height: 44px;
      padding: 0 16px;
      border-radius: var(--radius);
      border: none;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.96); opacity: .85; }
    .btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }

    .btn-init   { background: var(--ink);  color: var(--gold-lt); flex: 1; justify-content: center; }
    .btn-replay { background: var(--blue); color: #fff; flex: 1; justify-content: center; }
    .btn-clear  { background: #e0d5c5; color: var(--ink); flex: 1; justify-content: center; }

    /* ═══════════════════════════════════════
       AUDIO MONITORS
    ═══════════════════════════════════════ */
    .audio-monitor {
      background: #fff;
      border: 1px solid #e0d5c5;
      border-radius: var(--radius);
      padding: 10px 12px;
    }
    .audio-label {
      font-size: 0.72rem;
      color: #999;
      margin-bottom: 6px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    audio {
      width: 100%;
      height: 32px;
      display: block;
    }

    /* ═══════════════════════════════════════
       SCRIPT LINES
    ═══════════════════════════════════════ */
    .line {
      background: #fff;
      border: 1.5px solid #e5ddd0;
      border-radius: var(--radius);
      padding: 14px;
      transition: border-color .2s, background .2s, box-shadow .2s;
    }
    .line.active {
      border-color: var(--gold);
      background: #fffbf0;
      box-shadow: 0 0 0 3px rgba(201,146,42,0.12), 0 4px 16px var(--shadow);
    }
    .line.done {
      border-color: var(--green);
      background: #f0faf4;
    }
    .line.done .line-role::after {
      content: " ✓";
      color: var(--green);
      font-size: 0.85em;
    }

    .line-role {
      font-family: 'Noto Serif TC', serif;
      font-size: 0.78rem;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .line-text {
      font-size: 1.15rem;
      line-height: 1.65;
      color: var(--ink);
      margin-bottom: 12px;
    }

    /* 2×2 grid for line buttons */
    .line-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .line-btn {
      min-height: 44px;
      border-radius: 10px;
      border: 1.5px solid #e0d5c5;
      background: #fdf8f0;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: background .15s, border-color .15s, transform .1s;
      color: var(--ink);
    }
    .line-btn:active  { transform: scale(0.95); }
    .line-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; }

    .line-btn.btn-record { background: #fef0ee; border-color: #e8a090; color: var(--red); }
    .line-btn.btn-demo   { background: #eef4fc; border-color: #a0c0e0; color: var(--blue); }
    .line-btn.btn-goto   { background: #f5f5f5; border-color: #ccc; color: #555; }
    .line-btn.btn-play   { background: #f0faf4; border-color: #90d0a0; color: var(--green); }

    .line-btn.btn-record:active:not(:disabled) { background: #fcd9d4; }

    /* ═══════════════════════════════════════
       RECORDING INDICATOR
    ═══════════════════════════════════════ */
    .rec-bar {
      display: none;
      align-items: center;
      gap: 8px;
      background: #fef0ee;
      border: 1px solid #e8a090;
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.82rem;
      color: var(--red);
      font-weight: 700;
    }
    .rec-bar.active { display: flex; }
    .rec-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--red);
      animation: blink 0.8s ease-in-out infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.15; } }

    /* ═══════════════════════════════════════
       TABLET PORTRAIT / PHONE
    ═══════════════════════════════════════ */
    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto;
        height: auto;
        min-height: 100dvh;
        overflow-y: auto;
      }

      .panel-video {
        grid-column: 1;
        grid-row: 1;
      }

      .panel-controls {
        grid-column: 1;
        grid-row: 2;
        max-height: 55dvh;
      }

      .panel-actions {
        grid-column: 1;
        grid-row: 3;
        position: sticky;
        bottom: 0;
      }

      .line-btns {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 480px) {
      .topbar-title { font-size: 0.95rem; }
      .line-text { font-size: 1rem; }
    }
  </style>
</head>
<body>

<!-- ── TOP BAR ── -->
<div class="topbar">
  <div class="topbar-title">🎙️ 閩南語配音錄音室</div>
  <div id="status" class="topbar-status">尚未初始化</div>
</div>

<div class="app">

  <!-- ── LEFT: VIDEO ── -->
  <div class="panel-video">
    <video id="video" src="video.mp4" controls playsinline webkit-playsinline preload="auto"></video>
    <div class="hint-box">
      <p>
        <strong>💡 操作小叮嚀</strong><br>
        先按「允許麥克風」才能開始錄音。<br>
        錄音時影片會自動播放，時間到自動停止。<br>
        每句錄完可按「▶ 聽錄音」確認效果。
      </p>
    </div>
  </div>

  <!-- ── RIGHT TOP: SCRIPT ── -->
  <div class="panel-controls" id="script"></div>

  <!-- ── RIGHT BOTTOM: ACTION BAR ── -->
  <div class="panel-actions">

    <!-- Recording progress indicator -->
    <div class="rec-bar" id="recBar">
      <div class="rec-dot"></div>
      <span id="recTimer">錄音中…</span>
    </div>

    <!-- Option toggles -->
    <div class="options-row">
      <label class="toggle-label">
        <input type="checkbox" id="chkDemoSeek" checked> 📺 示範同步畫面
      </label>
      <label class="toggle-label">
        <input type="checkbox" id="chkAutoNext" checked> ⏭ 錄完自動下一句
      </label>
    </div>

    <!-- Main action buttons -->
    <div class="btn-row">
      <button class="btn btn-init"   id="btnInit">🎤 允許麥克風</button>
      <button class="btn btn-replay" id="btnReplayAll" disabled>▶ 聽配音成品</button>
      <button class="btn btn-clear"  id="btnClear"    disabled>🗑 清除</button>
    </div>

    <!-- Audio monitors -->
    <div class="audio-monitor">
      <div class="audio-label">🔊 示範播放</div>
      <audio id="demoPlayer" controls></audio>
    </div>
    <div class="audio-monitor">
      <div class="audio-label">🎤 你的錄音</div>
      <audio id="preview" controls></audio>
    </div>

  </div>
</div>

<script>
(() => {
  /* ─── 元素參照 ─── */
  const video       = document.getElementById('video');
  const btnInit     = document.getElementById('btnInit');
  const btnReplayAll= document.getElementById('btnReplayAll');
  const btnClear    = document.getElementById('btnClear');
  const statusEl    = document.getElementById('status');
  const scriptEl    = document.getElementById('script');
  const preview     = document.getElementById('preview');
  const demoPlayer  = document.getElementById('demoPlayer');
  const recBar      = document.getElementById('recBar');
  const recTimer    = document.getElementById('recTimer');

  const chkAutoNext  = document.getElementById('chkAutoNext');
  const chkDemoSeek  = document.getElementById('chkDemoSeek');

  /* ─── 劇本資料 ─── */
  const lines = [
    { role:"阿志",  text:"聽好！今年阿嬤的紅包特別大包，咱絕對袂使漏氣！",          start:0,     end:6.02  },
    { role:"美美",  text:"哼，我早就準備好了。「金銀財寶滿厝內，好運這馬緊落來」！", start:6.12,  end:12.14 },
    { role:"大胖",  text:"啊...我只想要食年糕...腹肚好餓...",                        start:12.80, end:18.17 },
    { role:"阿志",  text:"袂使食！這馬開始特訓！大胖，換你！上厲害彼句！",           start:18.18, end:25.03 },
    { role:"大胖",  text:"喔好！祝阿嬤...身體健康...萬事如意...食百二...",            start:25.30, end:33.03 },
    { role:"阿志",  text:"太普通啦！愛閣較有力咧！",                                  start:33.24, end:41.03 },
    { role:"阿嬤",  text:"乖孫～阿嬤來發紅包囉～",                                    start:42.60, end:47.01 },
    { role:"三人",  text:"阿嬤！",                                                     start:47.30, end:51.11 },
    { role:"大胖",  text:"阿嬤！祝你...祝你...「身體硬梆梆」！",                       start:51.60, end:56.14 },
    { role:"阿嬤",  text:"喔～身體真勇啦吼！真乖真乖，大包的予你！",                  start:60.00, end:65.10 },
  ];

  /* ─── 狀態 ─── */
  let micStream        = null;
  let currentIndex     = 0;
  let isRecording      = false;
  let currentDemoHandler = null;
  let recTimerInterval = null;
  const recordings     = new Array(lines.length).fill(null);
  const singlePlayer   = new Audio();

  /* ─── 工具函式 ─── */
  const setStatus = t => statusEl.textContent = t;

  const getSupportedMimeType = () => {
    const types = ['audio/mp4', 'audio/webm;codecs=opus', 'audio/webm', 'audio/ogg'];
    return types.find(t => MediaRecorder.isTypeSupported(t)) || '';
  };

  const seekTo = (el, t) => new Promise(resolve => {
    const done = () => { el.removeEventListener('seeked', done); resolve(); };
    el.addEventListener('seeked', done);
    el.currentTime = t;
  });

  /* ─── 渲染劇本 ─── */
  const render = () => {
    scriptEl.innerHTML = '';
    lines.forEach((l, i) => {
      const div = document.createElement('div');
      div.className = 'line';
      div.id = `line-${i}`;
      if (i === currentIndex) div.classList.add('active');
      if (recordings[i])     div.classList.add('done');

      div.innerHTML = `
        <div class="line-role">第 ${i+1} 句・${l.role}</div>
        <div class="line-text">${l.text}</div>
        <div class="line-btns">
          <button class="line-btn btn-record" data-act="record" data-i="${i}"
            ${!micStream || isRecording ? 'disabled' : ''}>🎤 錄音</button>
          <button class="line-btn btn-demo"   data-act="demo"   data-i="${i}"
            ${isRecording ? 'disabled' : ''}>🔊 聽示範</button>
          <button class="line-btn btn-goto"   data-act="goto"   data-i="${i}"
            ${isRecording ? 'disabled' : ''}>⏩ 跳畫面</button>
          <button class="line-btn btn-play"   data-act="play"   data-i="${i}"
            ${recordings[i] && !isRecording ? '' : 'disabled'}>▶ 聽錄音</button>
        </div>
      `;
      scriptEl.appendChild(div);
    });

    btnReplayAll.disabled = !recordings.some(Boolean) || isRecording;
    btnClear.disabled     = !recordings.some(Boolean) || isRecording;
  };

  const setActive = (i, { scroll = true } = {}) => {
    currentIndex = Math.max(0, Math.min(i, lines.length - 1));
    render();
    if (scroll) {
      setTimeout(() => {
        document.getElementById(`line-${currentIndex}`)?.scrollIntoView({ behavior:'smooth', block:'nearest' });
      }, 80);
    }
  };

  /* ─── 錄音計時器 ─── */
  const startRecBar = (lineEnd) => {
    recBar.classList.add('active');
    isRecording = true;
    render();
    recTimerInterval = setInterval(() => {
      const remaining = Math.max(0, lineEnd - video.currentTime);
      recTimer.textContent = `錄音中… 剩 ${remaining.toFixed(1)} 秒`;
    }, 100);
  };

  const stopRecBar = () => {
    recBar.classList.remove('active');
    isRecording = false;
    clearInterval(recTimerInterval);
    render();
  };

  /* ─── 聽示範 ─── */
  const playDemo = async (i) => {
    setActive(i, { scroll: false });
    const line = lines[i];

    if (currentDemoHandler) {
      video.removeEventListener('timeupdate', currentDemoHandler);
      currentDemoHandler = null;
    }

    preview.pause();
    demoPlayer.src = `sample/sample${String(i+1).padStart(2,'0')}.m4a`;

    if (chkDemoSeek.checked) {
      video.muted = true;
      video.currentTime = line.start;
      currentDemoHandler = () => {
        if (video.currentTime >= line.end) {
          video.pause();
          video.removeEventListener('timeupdate', currentDemoHandler);
          currentDemoHandler = null;
        }
      };
      video.addEventListener('timeupdate', currentDemoHandler);
      try { await video.play(); } catch(e) {}
    }

    try {
      await demoPlayer.play();
      setStatus(`📻 示範播放：第 ${i+1} 句`);
    } catch(e) {
      setStatus('⚠️ 音檔載入失敗');
    }
  };

  /* ─── 錄音 ─── */
  const recordLine = async (i) => {
    const line = lines[i];
    setActive(i);
    await seekTo(video, line.start);

    const mimeType = getSupportedMimeType();
    const recorder = new MediaRecorder(micStream, mimeType ? { mimeType } : {});
    const chunks   = [];
    video.muted    = true; // 錄音時影片靜音，避免干擾

    const stop = () => {
      video.pause();
      video.removeEventListener('timeupdate', onTime);
      if (recorder.state === 'recording') {
        // 先手動索取一次資料（相容 Safari），再 stop
        recorder.requestData();
        recorder.stop();
      }
    };
    const onTime = () => { if (video.currentTime >= line.end) stop(); };

    recorder.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = () => {
      if (chunks.length === 0) {
        stopRecBar();
        setStatus(`⚠️ 第 ${i+1} 句錄音失敗（無資料），請再試一次`);
        return;
      }
      const blob = new Blob(chunks, { type: mimeType || 'audio/webm' });
      recordings[i] = blob;
      preview.src = URL.createObjectURL(blob);
      stopRecBar();
      setStatus(`✅ 第 ${i+1} 句錄音完成，可按「聽錄音」確認`);
      if (chkAutoNext.checked && i < lines.length - 1) {
        setActive(i + 1);
      }
    };

    video.addEventListener('timeupdate', onTime);
    recorder.start(); // 不加 timeslice，錄成一整段，播放才不會斷
    startRecBar(line.end);
    setStatus(`🔴 錄製中：第 ${i+1} 句`);

    try { await video.play(); } catch(e) {}
  };

  /* ─── 回放成品 ─── */
  const replayAll = async () => {
    const hasAny = recordings.some(Boolean);
    if (!hasAny) return;

    setStatus('▶ 播放配音成品…');
    video.muted = true;
    video.removeAttribute('controls');
    video.currentTime = 0;
    let nextIdx = 0;

    const onTime = () => {
      const t = video.currentTime;
      if (nextIdx < lines.length && t >= lines[nextIdx].start) {
        if (recordings[nextIdx]) {
          setActive(nextIdx, { scroll: true });
          singlePlayer.src = URL.createObjectURL(recordings[nextIdx]);
          singlePlayer.play().catch(()=>{});
        }
        nextIdx++;
      }
      if (nextIdx > 0 && t >= lines[nextIdx-1].end) singlePlayer.pause();
    };

    const cleanup = () => {
      video.setAttribute('controls','');
      video.removeEventListener('timeupdate', onTime);
      video.removeEventListener('ended', cleanup);
      setStatus('⏹ 回放結束');
    };

    video.addEventListener('timeupdate', onTime);
    video.addEventListener('ended', cleanup);
    try { await video.play(); } catch(e) {}
  };

  /* ─── 頁面隱藏保護（多工切換） ─── */
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && isRecording) {
      // 找出正在進行的 recorder 並停止（透過 video pause 觸發 timeupdate end）
      video.pause();
      setStatus('⚠️ 已暫停：偵測到切換 App');
    }
  });

  /* ─── 事件委派：劇本按鈕 ─── */
  scriptEl.addEventListener('click', async e => {
    const btn = e.target.closest('button');
    if (!btn || btn.disabled) return;
    const { act, i } = btn.dataset;
    const idx = Number(i);

    if (act === 'record') await recordLine(idx);
    if (act === 'demo')   await playDemo(idx);
    if (act === 'goto') {
      setActive(idx);
      await seekTo(video, lines[idx].start);
      setStatus(`⏩ 跳到第 ${idx+1} 句`);
    }
    if (act === 'play') {
      preview.src = URL.createObjectURL(recordings[idx]);
      try { await preview.play(); } catch(e) {}
      setStatus(`▶ 播放第 ${idx+1} 句錄音`);
    }
  });

  /* ─── 全域按鈕 ─── */
  btnInit.addEventListener('click', async () => {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      btnInit.textContent = '麥克風已就緒 ✅';
      btnInit.disabled = true;
      setStatus('✅ 麥克風就緒，請開始錄音');
      render();
    } catch {
      alert('請允許麥克風權限後重新整理網頁。');
    }
  });

  btnReplayAll.addEventListener('click', replayAll);

  btnClear.addEventListener('click', () => {
    if (confirm('確定要刪除所有錄音重新開始嗎？')) {
      recordings.fill(null);
      setStatus('🗑 已清除全部錄音');
      render();
    }
  });

  /* ─── 初始化 ─── */
  setActive(0);
})();
</script>
</body>
</html>
